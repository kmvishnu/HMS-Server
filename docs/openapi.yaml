openapi: 3.0.0
info:
  title: Hotel Management System (HMS) API
  description: Comprehensive API for multi-hotel management, bookings, and customer search.
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Local development server
  - url: https://hms-server-mu.vercel.app
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  # --- Authentication ---
  /auth/register:
    post:
      summary: Register a new customer
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Bad request

  /auth/login:
    post:
      summary: Login and receive tokens
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  data: { type: object }

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Tokens refreshed

  # --- Public APIs ---
  /public/home:
    get:
      summary: Get landing page data
      tags: [Public]
      security: []
      responses:
        '200':
          description: Home data fetched

  /public/search:
    get:
      summary: Smart search for hotels
      tags: [Public]
      security: []
      parameters:
        - name: location
          in: query
          schema: { type: string }
        - name: checkIn
          in: query
          description: Check-in date. Must be today or later.
          schema: { type: string, format: date }
        - name: checkOut
          in: query
          description: Check-out date. Must be after check-in.
          schema: { type: string, format: date }
        - name: guests
          in: query
          schema: { type: integer }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: features
          in: query
          schema: { type: string }
        - name: page
          in: query
          description: Page number for pagination
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          description: Number of items per page
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: List of hotels

  /public/locations:
    get:
      summary: Get location suggestions
      tags: [Public]
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of locations

  /public/hotels:
    get:
      summary: Search hotels
      tags: [Public]
      security: []
      parameters:
        - name: location
          in: query
          schema: { type: string }
        - name: checkIn
          in: query
          schema: { type: string, format: date }
        - name: checkOut
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: List of hotels

  /public/hotels/{id}:
    get:
      summary: Get hotel details
      tags: [Public]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: checkIn
          in: query
          description: Optional. If provided, calculates availability for this date. Must be today or later.
          schema: { type: string, format: date }
        - name: checkOut
          in: query
          description: Optional. If provided, calculates availability for this date. Must be after check-in.
          schema: { type: string, format: date }
      responses:
        '200':
          description: Hotel details

  /availability:
    get:
      summary: Check global availability
      tags: [Public]
      security: []
      parameters:
        - name: checkIn
          in: query
          schema: { type: string, format: date }
        - name: checkOut
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Availability results

  # --- Shared/Dashboard ---
  /dashboard:
    get:
      summary: Get user-specific dashboard (Admin/Customer)
      tags: [Shared]
      responses:
        '200':
          description: Dashboard data

  # --- Customer APIs ---
  /bookings:
    post:
      summary: Create a booking
      tags: [Customer]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roomTypeId: { type: integer }
                checkIn: { type: string, format: date }
                checkOut: { type: string, format: date }
                notes: { type: string, maxLength: 500 }
                guests:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      age: { type: integer }
      responses:
        '201':
          description: Booking created

  /bookings/preview:
    post:
      summary: Get booking price preview
      tags: [Customer]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roomTypeId: { type: integer }
                checkIn: { type: string, format: date }
                checkOut: { type: string, format: date }
      responses:
        '200':
          description: Price preview data

  /bookings/my-bookings:
    get:
      summary: Get current user's bookings
      tags: [Customer]
      responses:
        '200':
          description: List of bookings

  /payments/create-order:
    post:
      summary: Create a payment order (Mock)
      tags: [Customer]
      responses:
        '200':
          description: Order created

  /payments/verify:
    post:
      summary: Verify payment (Mock)
      tags: [Customer]
      responses:
        '200':
          description: Payment verified

  # --- Owner/Staff Scoped ---
  /hotel/{hotelId}/dashboard:
    get:
      summary: Get advanced hotel dashboard
      description: Returns occupancy rates, today's check-ins/outs, upcoming bookings (5 days), and inventory alerts.
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Enhanced dashboard data

  /hotel/{hotelId}/profile-completion:
    get:
      summary: Get hotel profile completeness
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Completion percentage and missing fields

  /hotel/{hotelId}/analytics:
    get:
      summary: Get hotel analytics (7 days)
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Weekly occupancy and booking trends

  /hotel/{hotelId}/bookings:
    get:
      summary: List hotel bookings with advanced filters
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
        - name: filter
          in: query
          schema: { type: string, enum: [today, upcoming, checked-in, completed] }
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of bookings

  /hotel/bookings/{id}/notes:
    patch:
      summary: Update booking notes
      tags: [Management]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string, maxLength: 500 }
      responses:
        '200':
          description: Notes updated

  /hotel/{hotelId}/inventory/calendar:
    get:
      summary: Get inventory calendar grid
      description: Returns availability for all room types over a specified range (max 30 days).
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
        - name: startDate
          in: query
          required: true
          schema: { type: string, format: date }
        - name: endDate
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Inventory grid

  /hotel/{hotelId}/inventory:
    patch:
      summary: Bulk update inventory blocks
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roomTypeId: { type: integer }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
                availableCount: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Inventory updated

  /hotel/{hotelId}/room-types:
    get:
      summary: List room types for a hotel
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: List of room types (including images and availability)
    post:
      summary: Create room type
      description: "Creates a new room type for the hotel. **Automation**: Upon creation, the system automatically generates 90 days of inventory records."
      tags: [Management]
      parameters:
        - name: hotelId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                totalRooms: { type: integer }
                price: { type: number }
      responses:
        '201':
          description: Room type created

  # --- Admin APIs ---
  /admin/dashboard:
    get:
      summary: Admin dashboard stats
      tags: [Admin]
      responses:
        '200':
          description: Platform statistics

  /admin/search:
    get:
      summary: Global search across users, hotels, and bookings
      tags: [Admin]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Grouped search results

  /admin/users:
    get:
      summary: Paginated list of users
      tags: [Admin]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: List of users

  /admin/hotels:
    get:
      summary: Paginated list of hotels
      tags: [Admin]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: List of hotels

  /admin/hotels/{id}:
    get:
      summary: Full hotel details with paginated bookings
      tags: [Admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Comprehensive hotel view
    delete:
      summary: Soft delete hotel
      tags: [Admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Hotel soft-deleted
